apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-16
  namespace: ns16
  labels:
    type: fast-16
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  nfs:
    path: /srv/nfs/kubedata/pyapp  # Path exported by your NFS server
    server: 172.31.11.26    # Replace with your NFS server’s IP
